# AI Provider 설정
ai:
  provider: claude  # claude 또는 openai
  claude:
    model: claude-sonnet-4-6
  openai:
    model: gpt-4o

# 옵시디언 연동
obsidian:
  vault_path: ~/Documents/Obsidian  # 옵시디언 볼트 경로
  blog_folder: Blog                  # 볼트 내 블로그 글 폴더
  image_folder: Blog/images          # 볼트 내 이미지 폴더

# 글 작성 스타일: tutorial, til
post:
  default_style: tutorial
  language: ko

# GitHub 이미지 호스팅
github:
  repo: ""           # 예: username/blog-images
  branch: main
  image_dir: images

# 블로그 설정
blog:
  name: ""           # 티스토리 블로그 이름
  categories: {}     # 로드맵 대분류 → 카테고리 매핑
